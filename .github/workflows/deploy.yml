name: Build and Push to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Ruff check
        run: python -m ruff check .

      - name: ESLint
        run: npm run lint

      - name: Backend tests
        run: python -m pytest -q --cov=. --cov-report=term-missing --cov-fail-under=90

      - name: Frontend tests
        run: npm test -- --ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: pip-audit
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt --strict

      - name: Docker build
        run: docker build -t growth-calc:ci .

      - name: Docker smoke test (/health)
        run: |
          docker run -d --name growth-calc-smoke -p 18080:8080 growth-calc:ci
          # Wait up to 30 s for the container to become responsive.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              echo "Health check passed"; break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/health
          docker logs growth-calc-smoke
          docker stop growth-calc-smoke

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
